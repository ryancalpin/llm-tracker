name: Refresh LLM Data & Deploy

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/curated.json'
      - 'data/hosting.json'
      - 'data/specialties.json'

# Allow Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & build
        run: |
          python3 scripts/fetch_openrouter.py
          python3 scripts/fetch_specialties.py
          python3 scripts/merge.py
          cp -f data/models.json static/models.json
          python3 scripts/build_fat.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'static/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated data sources
        run: |
          git config user.name 'LLM Tracker Bot'
          git config user.email 'bot@llmtracker.dev'
          git add data/models.json data/openrouter_raw.json static/sync_state.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi