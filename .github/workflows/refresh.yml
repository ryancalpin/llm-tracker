name: Refresh LLM Data & Deploy to Netlify

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/curated.json'
      - 'data/hosting.json'
      - 'data/specialties.json'
      - 'static/*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & build
        run: |
          python3 scripts/fetch_openrouter.py
          python3 scripts/fetch_specialties.py
          python3 scripts/merge.py
          cp -f data/models.json static/models.json
          python3 scripts/build_fat.py

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy \
            --dir=static \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --prod \
            --message="Auto-refresh: ${{ github.event.head_commit.message || github.event_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}